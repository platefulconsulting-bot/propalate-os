            </div>`;
            html += `<tr onclick="openLead('${l.id}')">
          <td style="font-weight:600">${l.name || '—'}</td>
          <td class="phone">${l.phone || '—'}</td>
          <td class="muted">${l.restaurant_name || '—'}</td>
          <td class="muted" style="font-size:11px">${last}</td>
          <td style="color:${tempColor};font-weight:700;font-size:14px">${tempIcon}</td>
          <td>${badge(l.stage)}</td>
          <td>${actions}</td>
        </tr>`;
          });
          html += `</tbody></table></div>`;
        }
      }

      // ─── INBOX (WhatsApp-style) ───
      if (state.view === 'inbox') {
        const previews = state.inboxPreviews || {};
        // Leads with at least one logged message; sort by latest activity desc.
        const leadsWithChat = leads
          .filter(l => previews[l.id] || (l.total_msgs_sent || 0) > 0 || l.last_msg_sent_at || l.last_reply_at)
          .map(l => ({
            ...l,
            _activity: (() => {
              const p = previews[l.id];
              const a = p ? new Date(p.sent_at).getTime() : 0;
              const b = l.last_msg_sent_at ? new Date(l.last_msg_sent_at).getTime() : 0;
              const c = l.last_reply_at ? new Date(l.last_reply_at).getTime() : 0;
              return Math.max(a, b, c);
            })()
          }))
          .sort((a, b) => b._activity - a._activity);

        const search = (state.inboxSearch || '').toLowerCase();
        const filtered = search
          ? leadsWithChat.filter(l =>
              (l.name || '').toLowerCase().includes(search) ||
              (l.phone || '').includes(search) ||
              (l.restaurant_name || '').toLowerCase().includes(search) ||
              ((previews[l.id] || {}).message_body || '').toLowerCase().includes(search))
          : leadsWithChat;

        const selectedLead = state.inboxLeadId ? leads.find(l => l.id === state.inboxLeadId) : null;

        html += `<div style="display:flex;gap:0;border:1px solid var(--border);border-radius:12px;overflow:hidden;height:calc(100vh - 140px);min-height:480px;background:var(--bg2)">
          <div style="width:340px;min-width:280px;display:flex;flex-direction:column;border-right:1px solid var(--border)">
            <div style="padding:10px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center">
              <input id="inbox-search" placeholder="Search by name, phone, restaurant, body…" value="${escAttr(state.inboxSearch)}" oninput="state.inboxSearch=this.value;render()" style="flex:1;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12px;outline:none">
              <button class="btn btn-outline" style="padding:6px 10px;font-size:11px" onclick="loadInbox()" title="Refresh inbox">↻</button>
            </div>
            <div style="flex:1;overflow-y:auto">
              ${filtered.length === 0
                ? '<div class="muted" style="padding:24px;text-align:center;font-size:12px">No conversations yet. Once the worker logs an outbound or inbound, leads will appear here.</div>'
                : filtered.map(l => {
                    const p = previews[l.id] || {};
                    const isSelected = state.inboxLeadId === l.id;
                    const last = p.sent_at ? relTime(p.sent_at) : (l.last_msg_sent_at ? relTime(l.last_msg_sent_at) : '—');
                    const preview = p.message_body
                      ? ((p.status === 'received' || p.status === 'replied') ? '↩ ' : '') + String(p.message_body).slice(0, 60).replace(/\n/g, ' ')
                      : `${l.total_msgs_sent || 0} sent · ${l.total_replies || 0} replies`;
                    const initial = (l.name || '?').trim().charAt(0).toUpperCase();
                    const tempBadge = l.temperature === 'hot' ? '🔥' : l.temperature === 'warm' ? '⚡' : l.temperature === 'cold' ? '❄' : '';
                    const isUnread = (l.total_replies || 0) > 0 && l.last_reply_at && (!l.last_msg_sent_at || new Date(l.last_reply_at) > new Date(l.last_msg_sent_at));
                    return `<div onclick="selectInboxLead('${l.id}')" style="display:flex;gap:10px;padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--border);background:${isSelected ? 'var(--bg3)' : 'transparent'};${isSelected ? 'border-left:3px solid var(--gold)' : ''}">
                      <div style="width:36px;height:36px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--gold);flex-shrink:0">${initial}</div>
                      <div style="flex:1;min-width:0">
                        <div style="display:flex;justify-content:space-between;align-items:center;gap:6px">
                          <div style="font-weight:600;font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.name || '(no name)'} ${tempBadge}</div>
                          <div style="font-size:10px;color:var(--text3);flex-shrink:0">${last}</div>
                        </div>
                        <div style="display:flex;justify-content:space-between;align-items:center;gap:6px;margin-top:2px">
                          <div style="font-size:11px;color:${isUnread ? '#86efac' : 'var(--text3)'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;${isUnread ? 'font-weight:600' : ''}">${preview}</div>
                          ${isUnread ? '<span style="background:#4ade80;color:#000;border-radius:10px;padding:1px 6px;font-size:9px;font-weight:700;flex-shrink:0">NEW</span>' : ''}
                        </div>
                      </div>
                    </div>`;
                  }).join('')}
            </div>
            <div class="muted" style="padding:8px;text-align:center;font-size:10px;border-top:1px solid var(--border)">${filtered.length} of ${leadsWithChat.length} chats</div>
          </div>
          <div style="flex:1;display:flex;flex-direction:column;min-width:0">
            ${selectedLead ? `
              <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:10px">
                <div style="min-width:0">
                  <div style="font-weight:700;font-size:14px;color:var(--text)">${selectedLead.name || '(no name)'}</div>
                  <div style="font-size:11px;color:var(--text3)">${selectedLead.phone || '—'}${selectedLead.restaurant_name ? ' · ' + selectedLead.restaurant_name : ''}${selectedLead.city ? ' · ' + selectedLead.city : ''} · ${badge(selectedLead.stage)}</div>
                </div>
                <div style="display:flex;gap:6px;flex-shrink:0">
                  ${selectedLead.phone ? `<button onclick="openWAFor('${selectedLead.id}')" style="padding:6px 12px;background:rgba(74,222,128,0.12);border:1px solid rgba(74,222,128,0.3);color:#86efac;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">Open WhatsApp</button>` : ''}
                  <button onclick="openLead('${selectedLead.id}')" style="padding:6px 12px;background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit">Edit lead</button>
                </div>
              </div>
              <div id="inbox-chat-scroll" style="flex:1;overflow-y:auto;padding:14px 16px;background:var(--bg)">${renderChatPanel(state.inboxChat)}</div>
            ` : `
              <div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:13px;text-align:center;padding:24px">
                Select a conversation on the left to view it here.<br><span style="font-size:11px">Showing chats logged by the worker — auto-sends, manual sends from the linked phone, and inbound replies.</span>
              </div>
            `}
          </div>
        </div>`;
      }

      // ─── INCOMPLETE ───
      if (state.view === 'incomplete') {
        const isBlank = v => !v || !String(v).trim();
        const incomplete = leads.filter(l => isBlank(l.name) && isBlank(l.restaurant_name));
        const onlyName = leads.filter(l => isBlank(l.name) && !isBlank(l.restaurant_name));
        const onlyRest = leads.filter(l => !isBlank(l.name) && isBlank(l.restaurant_name));

        html += `<div class="stats-row">
      <div class="stat-card" style="border-color:var(--red)"><div class="label">No name + no restaurant</div><div class="value">${incomplete.length}</div></div>
      <div class="stat-card" style="border-color:var(--orange)"><div class="label">Missing name only</div><div class="value">${onlyName.length}</div></div>
      <div class="stat-card" style="border-color:var(--orange)"><div class="label">Missing restaurant only</div><div class="value">${onlyRest.length}</div></div>
      <div class="stat-card"><div class="label">Total leads</div><div class="value">${leads.length}</div></div>
    </div>`;

        const filt = state.incompleteFilter || 'both';
        html += `<div class="toolbar">
      <select onchange="state.incompleteFilter=this.value;render()">
        <option value="both" ${filt === 'both' ? 'selected' : ''}>Missing both name + restaurant (${incomplete.length})</option>
        <option value="name" ${filt === 'name' ? 'selected' : ''}>Missing name only (${onlyName.length})</option>
        <option value="restaurant" ${filt === 'restaurant' ? 'selected' : ''}>Missing restaurant only (${onlyRest.length})</option>
      </select>
      ${incomplete.length && filt === 'both' ? `<button class="btn btn-danger" onclick="deleteAllIncomplete()">🗑 Delete all ${incomplete.length}</button>` : ''}
      <button class="btn btn-outline" onclick="loadAll()">Refresh</button>
    </div>`;

        const rows = filt === 'name' ? onlyName : filt === 'restaurant' ? onlyRest : incomplete;

        if (!rows.length) {
          html += `<div class="card" style="text-align:center;padding:32px;color:var(--text3)">No incomplete leads in this view. Imports look clean.</div>`;
        } else {
          html += `<div class="table-wrap"><table>
        <thead><tr><th>Name</th><th>Phone</th><th>Restaurant</th><th>City</th><th>Source</th><th>Created</th><th>Stage</th><th></th></tr></thead><tbody>`;
          rows.slice(0, 200).forEach(l => {
            const created = l.created_at ? new Date(l.created_at).toLocaleDateString('en-IN', { day: '2-digit', month: 'short' }) : '—';
            html += `<tr onclick="openLead('${l.id}')">
          <td style="font-weight:600">${l.name || '<span class="muted">—</span>'}</td>
          <td class="phone">${l.phone || '—'}</td>
          <td class="muted">${l.restaurant_name || '<span style="color:var(--red)">—</span>'}</td>
          <td class="muted">${l.city || '—'}</td>
          <td class="muted" style="font-size:11px">${l.source || '—'}</td>
          <td class="muted" style="font-size:11px">${created}</td>
          <td>${badge(l.stage)}</td>
          <td><button onclick="event.stopPropagation();deleteLead('${l.id}','${(l.name || l.phone || 'this lead').replace(/'/g, '')}')" style="background:rgba(248,113,113,0.12);border:1px solid rgba(248,113,113,0.3);color:#fca5a5;border-radius:6px;padding:4px 10px;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit">🗑 Delete</button></td>
        </tr>`;
          });
          html += `</tbody></table></div>`;
          if (rows.length > 200) {
            html += `<div class="muted" style="text-align:center;padding:12px;font-size:11px">Showing first 200 of ${rows.length}. Bulk-delete to clear them, then re-load.</div>`;
          }
        }
      }

      // ─── PAIN POINTS (replaces former Sequences view) ───
      if (state.view === 'painpoints' || state.view === 'sequences') {
        html += `<h2 style="font-size:18px;font-weight:700;margin-bottom:20px;color:var(--gold)">Pain Points</h2>`;

        // Bucket leads by canonical pain point. "Other: <text>" rolls up into the Other bucket.
        const bucket = {};
        PAIN_POINTS.forEach(pp => bucket[pp] = []);
        bucket['Untagged'] = [];
        leads.forEach(l => {
          const pp = l.pain_point;
          if (!pp) bucket['Untagged'].push(l);
          else if (String(pp).startsWith('Other:')) bucket['Other'].push(l);
          else if (PAIN_POINTS.includes(pp)) bucket[pp].push(l);
          else bucket['Other'].push(l); // legacy / unknown values
        });

        // Stats row
        html += `<div class="stats-row">`;
        PAIN_POINTS.forEach(pp => {
          html += `<div class="stat-card"><div class="label">${pp}</div><div class="value">${bucket[pp].length}</div></div>`;
        });
        html += `<div class="stat-card" style="border-color:var(--text3)"><div class="label">Untagged</div><div class="value">${bucket['Untagged'].length}</div></div>`;
        html += `</div>`;

        // List each bucket with sample leads
        PAIN_POINTS.forEach(pp => {
          const ls = bucket[pp];
          if (!ls.length) return;
          html += `<div class="seq-card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
              <h3>${pp}</h3>
              <span class="muted" style="font-size:12px">${ls.length} lead${ls.length === 1 ? '' : 's'}</span>
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:6px">
              ${ls.slice(0, 30).map(l => `<span onclick="openLead('${l.id}')" style="cursor:pointer;padding:4px 10px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);font-size:11px;color:var(--text2)">${l.name || '(no name)'}${pp === 'Other' && String(l.pain_point).startsWith('Other:') ? ' — ' + escAttr(String(l.pain_point).slice(6).trim()) : ''}</span>`).join('')}
              ${ls.length > 30 ? `<span class="muted" style="font-size:11px;padding:4px 10px">+${ls.length - 30} more</span>` : ''}
            </div>
          </div>`;
        });

        html += `<div style="background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px;margin-top:16px;font-size:12px;color:var(--text2)">
          Pain points are tags you assign on each lead's detail modal. They categorise *why* the lead might engage — separate from messaging mechanics. Filter and bulk-tag features can be added if you want them.
        </div>`;
      }

      // ─── LOGS ───
      if (state.view === 'logs') {
        html += `<h2 style="font-size:18px;font-weight:700;margin-bottom:20px;color:var(--gold)">Send log</h2>`;
        html += `<div class="table-wrap"><table>
      <thead><tr><th>Time</th><th>Channel</th><th>Step</th><th>Status</th><th>Message preview</th></tr></thead>
      <tbody>`;
        if (state.sendLog.length === 0) html += `<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text3)">No messages sent yet</td></tr>`;
        state.sendLog.forEach(s => {
          const chBadge = s.channel === 'whatsapp' ? '<span style="padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;background:rgba(74,222,128,0.15);color:#86efac">WA</span>' : '<span style="padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;background:rgba(96,165,250,0.15);color:#93c5fd">EMAIL</span>';
          html += `<tr>
        <td class="muted" style="font-size:11px">${new Date(s.sent_at).toLocaleString('en-IN')}</td>
        <td>${chBadge}</td>
        <td class="muted">#${s.step_number || '-'}</td>
        <td>${badge(s.status === 'sent' ? 'contacted' : s.status === 'delivered' ? 'interested' : s.status === 'replied' ? 'replied' : s.status === 'failed' ? 'dead' : 'new')}</td>
        <td class="muted" style="font-size:11px;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${(s.message_body || '').substring(0, 80)}...</td>
      </tr>`;
        });
        html += `</tbody></table></div>`;
      }

      html += '</main>';

      // ─── MODALS ───

      // ADD LEAD
      if (state.showAddLead) {
        html += `<div class="overlay" onclick="state.showAddLead=false;render()">
      <div class="modal" onclick="event.stopPropagation()">
        <h2>Add lead</h2>
        <div class="grid2">
          <div><label>Name *</label><input id="al-name" /></div>
          <div><label>Phone * (+91...)</label><input id="al-phone" /></div>
          <div><label>Restaurant</label><input id="al-rest" /></div>
          <div><label>City</label><input id="al-city" /></div>
          <div><label>Cuisine</label><input id="al-cuisine" /></div>
          <div><label>Swiggy rating</label><input id="al-sr" type="number" step="0.1" /></div>
          <div><label>Zomato rating</label><input id="al-zr" type="number" step="0.1" /></div>
          <div><label>Sequence</label><select id="al-seq"><option value="">None</option>${seqs.map(s => `<option value="${s.id}">${s.name}</option>`).join('')}</select></div>
        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:16px;padding:14px" onclick="doAddLead()">Add lead</button>
      </div>
    </div>`;
      }

      // CSV / EXCEL UPLOAD
      if (state.showCSV) {
        const isDirectUpload = state.uploadContext === 'direct';
        html += `<div class="overlay" onclick="state.showCSV=false;state.uploadContext='leads';render()">
      <div class="modal" style="max-width:700px" onclick="event.stopPropagation()">
        <h2>${isDirectUpload ? 'Upload direct leads sheet' : 'Upload CSV / Excel'}</h2>
        ${isDirectUpload ? `<div style="background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);border-radius:8px;padding:8px 14px;margin-bottom:12px;font-size:12px;color:var(--gold)">Rows uploaded here are tagged <b>source = direct</b> and live only in the Direct tab.</div>` : ''}
        <input type="file" id="csv-file" accept=".csv,.xlsx,.xls" onchange="handleFile(this)" />
        <div class="muted" style="font-size:11px;margin:8px 0 12px">Accepts .csv, .xlsx, .xls. Required: name + phone. Common headers auto-map: Full name, Phone number, Restaurant / Cafe Name, City, Email, Campaign Name, etc.</div>
        <div id="csv-preview"></div>
      </div>
    </div>`;
      }

      // LEAD DETAIL
      if (state.selectedLead) {
        const l = state.selectedLead;
        const editing = !!state.editingLead;
        html += `<div class="overlay" onclick="state.selectedLead=null;state.selectedLeadChat=null;state.editingLead=false;render()">
      <div class="modal" onclick="event.stopPropagation()" style="max-width:980px;display:flex;gap:20px;flex-wrap:wrap;align-items:stretch">
        <div style="flex:1 1 320px;min-width:280px">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:12px">
          ${editing
            ? `<input id="ld-name" value="${escAttr(l.name || '')}" placeholder="Name" style="font-size:18px;font-weight:700;flex:1">`
            : `<h2 style="margin:0">${l.name || '<span class="muted">(no name)</span>'}</h2>`
          }
          <button class="btn btn-outline" style="padding:6px 12px;font-size:12px;flex-shrink:0;${editing ? 'border-color:var(--gold);color:var(--gold)' : ''}" onclick="toggleEditLead()">${editing ? '✓ Done editing' : '✎ Edit'}</button>
        </div>
        ${editing
          ? `<div class="grid2" style="margin-bottom:16px">
              <div><label>Phone *</label><input id="ld-phone" value="${escAttr(l.phone || '')}" placeholder="+91XXXXXXXXXX"></div>
              <div><label>Email</label><input id="ld-email" value="${escAttr(l.email || '')}" placeholder="email@example.com"></div>
              <div><label>Restaurant Name</label><input id="ld-rest" value="${escAttr(l.restaurant_name || '')}"></div>
              <div><label>City</label><input id="ld-city" value="${escAttr(l.city || '')}"></div>
              <div><label>Area</label><input id="ld-area" value="${escAttr(l.area || '')}"></div>
              <div><label>Cuisine</label><input id="ld-cuisine" value="${escAttr(l.cuisine || '')}"></div>
              <div><label>Swiggy rating</label><input id="ld-sr" type="number" step="0.1" value="${l.swiggy_rating || ''}"></div>
              <div><label>Zomato rating</label><input id="ld-zr" type="number" step="0.1" value="${l.zomato_rating || ''}"></div>
              <div><label>Monthly orders</label><input id="ld-mo" value="${escAttr(l.monthly_orders || '')}"></div>
            </div>`
          : `<div class="grid2" style="margin-bottom:16px">
              <div><label>Phone</label><div class="phone" style="font-size:15px;margin-top:2px">${l.phone}</div></div>
              <div><label>Restaurant</label><div style="font-size:14px;margin-top:2px">${l.restaurant_name || '—'}</div></div>
              <div><label>City</label><div style="font-size:14px;margin-top:2px">${l.city || '—'}${l.area ? ' · ' + l.area : ''}</div></div>
              <div><label>Ratings</label><div style="font-size:14px;margin-top:2px">S: ${l.swiggy_rating || '—'} | Z: ${l.zomato_rating || '—'}</div></div>
              <div><label>Msgs sent</label><div style="font-size:14px;margin-top:2px;font-family:var(--mono)">${l.total_msgs_sent}</div></div>
              <div><label>Replies</label><div style="font-size:14px;margin-top:2px;font-family:var(--mono)">${l.total_replies}</div></div>
            </div>`
        }
        <div class="grid2">
          <div><label>Stage</label><select id="ld-stage" onchange="quickSetStage('${l.id}', this.value)">${STAGES.map(s => `<option value="${s.key}" ${l.stage === s.key ? 'selected' : ''}>${s.label}</option>`).join('')}</select></div>
          <div>
            <label>Pain Point</label>
            <select id="ld-pain" onchange="document.getElementById('ld-pain-other').style.display = this.value==='Other' ? 'block' : 'none'">
              <option value="">None</option>
              ${PAIN_POINTS.map(pp => {
                const selected = l.pain_point && (l.pain_point === pp || (pp === 'Other' && String(l.pain_point).startsWith('Other:'))) ? 'selected' : '';
                return `<option value="${pp}" ${selected}>${pp}</option>`;
              }).join('')}
            </select>
            <input id="ld-pain-other" type="text" placeholder="Type custom pain point..." value="${escAttr(String(l.pain_point || '').startsWith('Other:') ? String(l.pain_point).slice(6).trim() : '')}" style="display:${String(l.pain_point || '').startsWith('Other:') ? 'block' : 'none'};margin-top:6px">
          </div>
        </div>
        <label>Notes</label><textarea id="ld-notes">${escAttr(l.notes || '')}</textarea>
        <label style="display:flex;justify-content:space-between;align-items:center"><span>Custom WhatsApp template <span class="muted" style="font-size:10px;font-weight:400">(overrides sequence step for this lead — placeholders {{name}}, {{restaurant_name}}, {{city}}, {{swiggy_rating}}, {{zomato_rating}})</span></span>${l.custom_template ? '<span style="font-size:10px;font-weight:700;color:#c9a84c">CUSTOM ACTIVE</span>' : ''}</label>
        <textarea id="ld-tpl" rows="3" placeholder="Leave blank to use the sequence step's default template" oninput="checkBannedInline('ld-tpl','ld-tpl-warn')">${escAttr(l.custom_template || '')}</textarea>
        <div id="ld-tpl-warn" style="display:none;margin-top:6px;padding:8px 10px;background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.3);border-radius:6px;font-size:11px;color:#fde68a"></div>
        <div style="display:flex;gap:12px;flex-wrap:wrap">
          <button class="btn btn-primary" style="flex:1;padding:14px;min-width:100px" onclick="doUpdateLead('${l.id}')">Save</button>
          ${l.phone ? `<button class="btn" style="padding:14px 20px;background:rgba(74,222,128,0.15);color:#86efac;border:1px solid rgba(74,222,128,0.35)" onclick="openWAFor('${l.id}')">Message on WhatsApp</button>` : ''}
          ${l.sequence_id ? (l.paused
            ? `<button class="btn" style="padding:14px 20px;background:rgba(74,222,128,0.12);color:#86efac;border:1px solid rgba(74,222,128,0.3)" onclick="resumeLead('${l.id}')">▶ Resume sequence</button>`
            : `<button class="btn" style="padding:14px 20px;background:rgba(251,191,36,0.12);color:#fbbf24;border:1px solid rgba(251,191,36,0.3)" onclick="pauseLead('${l.id}')">⏸ Pause sequence</button>`
          ) : ''}
          <button class="btn btn-danger" style="padding:14px 20px" onclick="updateLead('${l.id}',{stage:'dnc',next_send_at:null})">Mark DNC</button>
          <button class="btn btn-danger" style="padding:14px 20px;background:rgba(248,113,113,0.2);border-color:rgba(248,113,113,0.5)" onclick="deleteLead('${l.id}','${(l.name || l.phone || 'this lead').replace(/'/g, '')}')">🗑 Delete</button>
        </div>
        </div>
        <div style="flex:1 1 320px;min-width:280px;display:flex;flex-direction:column;border-left:1px solid var(--border);padding-left:20px;max-height:70vh">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <h3 style="font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin:0">Conversation</h3>
            <span class="muted" style="font-size:10px">${state.selectedLeadChat ? state.selectedLeadChat.length + ' messages' : ''}</span>
          </div>
          <div id="lead-chat-scroll" style="flex:1;overflow-y:auto;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;min-height:300px">
            ${renderChatPanel(state.selectedLeadChat)}
          </div>
          <div class="muted" style="font-size:10px;margin-top:6px;text-align:center">Shows messages logged in send_log. Off-system chats won't appear.</div>
        </div>
      </div>
    </div>`;
      }

      // MESSAGE LOG MODAL
      if (state.showMsgLog) {
        const rows = state.msgLogRows;
        const filt = state.msgLogFilter || 'all';
        const counts = rows ? {
          all: rows.length,
          sent: rows.filter(r => r.status === 'sent').length,
          replied: rows.filter(r => r.status === 'replied').length,
          failed: rows.filter(r => r.status === 'failed').length,
        } : null;
        const filtered = !rows ? [] : (filt === 'all' ? rows : rows.filter(r => r.status === filt));
        const leadById = Object.fromEntries(leads.map(l => [l.id, l]));
        const statusBadge = (s) => {
          if (s === 'sent') return `<span style="background:rgba(96,165,250,0.18);color:#93c5fd;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;letter-spacing:0.5px">📤 SENT</span>`;
          if (s === 'replied') return `<span style="background:rgba(74,222,128,0.18);color:#86efac;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;letter-spacing:0.5px">📥 REPLIED</span>`;
          if (s === 'failed') return `<span style="background:rgba(239,68,68,0.18);color:#fca5a5;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;letter-spacing:0.5px">⚠ FAILED</span>`;
          return `<span class="muted">${s}</span>`;
        };
        html += `<div class="overlay" onclick="closeMsgLog()">
      <div class="modal" onclick="event.stopPropagation()" style="max-width:1000px;max-height:85vh;display:flex;flex-direction:column">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:10px;flex-wrap:wrap">
          <h2 style="margin:0">Message log <span class="muted" style="font-size:13px;font-weight:400">${rows ? `(${rows.length} most recent)` : ''}</span></h2>
          <button class="btn btn-outline" onclick="closeMsgLog()" style="padding:6px 14px;font-size:12px">Close</button>
        </div>
        ${rows === null
          ? `<div class="muted" style="text-align:center;padding:40px 0">Loading…</div>`
          : !rows.length
            ? `<div class="muted" style="text-align:center;padding:40px 0">No messages logged yet</div>`
            : `<div class="toolbar" style="margin-bottom:10px">
                <select onchange="state.msgLogFilter=this.value;render()">
                  <option value="all" ${filt === 'all' ? 'selected' : ''}>All (${counts.all})</option>
                  <option value="sent" ${filt === 'sent' ? 'selected' : ''}>📤 Sent (${counts.sent})</option>
                  <option value="replied" ${filt === 'replied' ? 'selected' : ''}>📥 Replied (${counts.replied})</option>
                  <option value="failed" ${filt === 'failed' ? 'selected' : ''}>⚠ Failed (${counts.failed})</option>
                </select>
                <button class="btn btn-outline" onclick="openMsgLog()">Refresh</button>
              </div>
              <div style="flex:1;overflow-y:auto;border:1px solid var(--border);border-radius:8px">
                <table style="width:100%;border-collapse:collapse">
                  <thead style="position:sticky;top:0;background:var(--bg);z-index:1">
                    <tr>
                      <th style="text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);font-size:10px;color:var(--text3);font-weight:700;letter-spacing:0.5px;text-transform:uppercase">When</th>
                      <th style="text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);font-size:10px;color:var(--text3);font-weight:700;letter-spacing:0.5px;text-transform:uppercase">Status</th>
                      <th style="text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);font-size:10px;color:var(--text3);font-weight:700;letter-spacing:0.5px;text-transform:uppercase">Lead</th>
                      <th style="text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);font-size:10px;color:var(--text3);font-weight:700;letter-spacing:0.5px;text-transform:uppercase">Message</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${filtered.slice(0, 200).map(r => {
                      const lead = leadById[r.lead_id];
                      const name = lead ? (lead.name || lead.restaurant_name || lead.phone || '—') : '<span class="muted">unknown</span>';
                      const body = r.message_body ? String(r.message_body).slice(0, 140) : (r.error_msg ? `<span style="color:#fca5a5">${escAttr(r.error_msg)}</span>` : '—');
                      const click = lead ? `onclick="closeMsgLog();openLead('${lead.id}')" style="cursor:pointer"` : '';
                      return `<tr ${click}>
                        <td style="padding:8px 12px;border-bottom:1px solid var(--border);font-size:11px;color:var(--text2);white-space:nowrap">${relTime(r.sent_at)}</td>
                        <td style="padding:8px 12px;border-bottom:1px solid var(--border)">${statusBadge(r.status)}</td>
                        <td style="padding:8px 12px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600">${name}</td>
                        <td style="padding:8px 12px;border-bottom:1px solid var(--border);font-size:11px;color:var(--text2);max-width:400px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escAttr(String(body))}</td>
                      </tr>`;
                    }).join('')}
                  </tbody>
                </table>
              </div>
              ${filtered.length > 200 ? `<div class="muted" style="text-align:center;padding:8px;font-size:11px">Showing 200 of ${filtered.length} — newest first</div>` : ''}`
        }
      </div>
    </div>`;
      }

      // WA TEMPLATE
      if (state.showWaTemplate) {
        html += `<div class="overlay" onclick="state.showWaTemplate=false;render()">
      <div class="modal" onclick="event.stopPropagation()">
        <h2>WhatsApp template</h2>
        <div class="muted" style="font-size:11px;margin-bottom:10px">Placeholders: <b>{firstName}</b>, <b>{name}</b>, <b>{restaurant}</b>, <b>{city}</b></div>
        <textarea id="wa-tpl" rows="6" style="min-height:140px" oninput="checkBannedInline('wa-tpl','wa-tpl-warn')">${escAttr(state.waTemplate)}</textarea>
        <div id="wa-tpl-warn" style="display:none;margin-top:8px;padding:8px 10px;background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.3);border-radius:6px;font-size:11px;color:#fde68a"></div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="btn btn-outline" style="flex:1;padding:14px" onclick="resetWaTemplate()">Reset to default</button>
          <button class="btn btn-primary" style="flex:1;padding:14px" onclick="saveWaTemplate()">Save</button>
        </div>
      </div>
    </div>`;
      }

      app.innerHTML = html;
      _restoreFocus();
      // Initial banned-keyword scan when template fields are present.
      if (document.getElementById('ld-tpl')) checkBannedInline('ld-tpl', 'ld-tpl-warn');
      if (document.getElementById('wa-tpl')) checkBannedInline('wa-tpl', 'wa-tpl-warn');
    }

    // ══════════════════════════════════════════════════════════════
    // ACTIONS
    // ══════════════════════════════════════════════════════════════
    window.doLogin = function () {
      const pw = document.getElementById('pw')?.value;
      if (pw === state.password) { state.authed = true; sessionStorage.setItem('pfc_authed', 'true'); render(); loadAll(); }
      else alert('Wrong password');
    };

    window.setView = function (v) {
      state.view = v;
      render();
      if (v === 'inbox' && Object.keys(state.inboxPreviews || {}).length === 0) loadInbox();
    };

    // Pull the latest 1000 message rows and reduce to one preview per lead (most recent).
    async function loadInbox() {
      try {
        const rows = await sb('send_log?select=lead_id,message_body,sent_at,status&order=sent_at.desc&limit=1000');
        const previews = {};
        (rows || []).forEach(r => { if (r.lead_id && !previews[r.lead_id]) previews[r.lead_id] = r; });
        state.inboxPreviews = previews;
        render();
      } catch (e) {
        console.warn('loadInbox failed:', e.message);
        showToast('Failed to load inbox', 'error');
      }
    }

    window.loadInbox = loadInbox;

    window.selectInboxLead = async function (id) {
      state.inboxLeadId = id;
      state.inboxChat = null;
      render();
      try {
        const rows = await sb(`send_log?lead_id=eq.${id}&order=sent_at.asc&limit=500`);
        if (state.inboxLeadId !== id) return;
        state.inboxChat = rows || [];
        render();
        setTimeout(() => {
          const el = document.getElementById('inbox-chat-scroll');
          if (el) el.scrollTop = el.scrollHeight;
        }, 0);
      } catch (e) {
        if (state.inboxLeadId === id) {
          state.inboxChat = [];
          render();
        }
        console.warn('selectInboxLead failed:', e.message);
      }
    };

    window.openLead = function (id) {
      state.selectedLead = state.leads.find(l => l.id === id);
      state.selectedLeadChat = null;
      state.editingLead = false; // open in view mode by default
      render();
      if (state.selectedLead) loadLeadChat(id);
    };

    window.toggleEditLead = function () {
      state.editingLead = !state.editingLead;
      render();
    };

    async function loadLeadChat(leadId) {
      try {
        const rows = await sb(`send_log?lead_id=eq.${leadId}&order=sent_at.asc&limit=500`);
        if (!state.selectedLead || state.selectedLead.id !== leadId) return; // user already moved on
        state.selectedLeadChat = rows || [];
        render();
        // Scroll the chat panel to the most recent message after the DOM is updated.
        setTimeout(() => {
          const el = document.getElementById('lead-chat-scroll');
          if (el) el.scrollTop = el.scrollHeight;
        }, 0);
      } catch (e) {
        if (state.selectedLead && state.selectedLead.id === leadId) {
          state.selectedLeadChat = [];
          render();
        }
        console.warn('loadLeadChat failed:', e.message);
      }
    }

    function renderChatPanel(chat) {
      if (chat === null) return '<div class="muted" style="text-align:center;padding:20px;font-size:12px">Loading conversation…</div>';
      if (chat.length === 0) return '<div class="muted" style="text-align:center;padding:20px;font-size:12px">No messages on record yet. Inbound replies and outbound sends will appear here once the worker logs them.</div>';
      return chat.map(m => {
        const isInbound = m.status === 'received' || m.status === 'replied';
        const isFailed = m.status === 'failed';
        const time = m.sent_at ? new Date(m.sent_at).toLocaleString('en-IN', { dateStyle: 'short', timeStyle: 'short' }) : '';
        const align = isInbound ? 'flex-start' : 'flex-end';
        const bg = isInbound ? '#1a1a1a' : (isFailed ? 'rgba(248,113,113,0.10)' : 'rgba(74,222,128,0.08)');
        const border = isInbound ? '#2a2a2a' : (isFailed ? 'rgba(248,113,113,0.3)' : 'rgba(74,222,128,0.25)');
        const meta = isInbound ? '↩ received' : (isFailed ? '✗ failed' + (m.error_msg ? ': ' + m.error_msg : '') : '✓ sent' + (m.step_number ? ` · step ${m.step_number}` : ''));
        const body = String(m.message_body || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        return `<div style="display:flex;justify-content:${align};margin-bottom:8px">
          <div style="max-width:85%;background:${bg};border:1px solid ${border};border-radius:10px;padding:8px 12px">
            <div style="font-size:13px;line-height:1.45;white-space:pre-wrap;color:var(--text)">${body}</div>
            <div style="font-size:9px;color:var(--text3);margin-top:4px;text-align:${isInbound ? 'left' : 'right'}">${meta} · ${time}</div>
          </div>
        </div>`;
      }).join('');
    }

    window.doAddLead = function () {
      const name = document.getElementById('al-name')?.value;
      const phoneRaw = document.getElementById('al-phone')?.value;
      if (!name || !phoneRaw) return alert('Name and phone required');
      const phone = normalizePhone(phoneRaw);
      if (!phone) return alert('Phone number could not be recognised. Use +91XXXXXXXXXX or a 10-digit Indian mobile.');
      const seqId = document.getElementById('al-seq')?.value;
      addLead({
        name, phone,
        restaurant_name: document.getElementById('al-rest')?.value || '',
        city: document.getElementById('al-city')?.value || '',
        cuisine: document.getElementById('al-cuisine')?.value || '',
        swiggy_rating: document.getElementById('al-sr')?.value ? parseFloat(document.getElementById('al-sr').value) : null,
        zomato_rating: document.getElementById('al-zr')?.value ? parseFloat(document.getElementById('al-zr').value) : null,
        sequence_id: seqId || null,
        stage: seqId ? 'queued' : 'new',
        next_send_at: seqId ? new Date().toISOString() : null,
        source: 'manual',
      });
    };

    window.pauseLead = function (id) { updateLead(id, { paused: true }); };
    window.resumeLead = function (id) {
      const lead = state.leads.find(l => l.id === id);
      const updates = { paused: false };
      // If next_send_at is null (e.g., from a prior mass-pause), schedule immediately so
      // the worker actually picks it up. Otherwise keep whatever future time was on it.
      if (!lead || !lead.next_send_at) updates.next_send_at = new Date().toISOString();
      updateLead(id, updates);
    };

    window.resumeAllPaused = async function () {
      const ids = state.leads.filter(l => l.paused).map(l => l.id);
      if (!ids.length) return showToast('No paused leads', 'error');
      if (!confirm(`Resume all ${ids.length} paused leads?\nAll will be unpaused and rescheduled to send immediately.`)) return;
      try {
        const BATCH = 200;
        for (let i = 0; i < ids.length; i += BATCH) {
          const slice = ids.slice(i, i + BATCH).join(',');
          await sb(`leads?id=in.(${slice})`, { method: 'PATCH', body: JSON.stringify({ paused: false, next_send_at: new Date().toISOString() }) });
        }
        showToast(`Resumed ${ids.length} leads`);
        loadAll();
      } catch (e) { showToast('Resume failed: ' + e.message, 'error'); }
    };

    // One-shot bulk action: push every eligible lead into the active queue.
    // Eligible = NOT in a terminal stage (replied/interested/call_booked/client/dnc/dead).
    // Leads without a sequence get the picked sequence assigned; everyone gets unpaused
    // and scheduled to send now. Use after a fresh import or when you want to start
    // the never-ending loop across the whole list.
    window.queueAllLeads = async function () {
      const seqs = state.sequences || [];
      if (!seqs.length) return showToast('Create a sequence first', 'error');

      const TERMINAL = ['replied', 'interested', 'call_booked', 'client', 'dnc', 'dead'];
      const eligible = state.leads.filter(l => !TERMINAL.includes(l.stage));
      if (!eligible.length) return showToast('No eligible leads', 'error');

      const skipped = state.leads.length - eligible.length;
      const noSeq = eligible.filter(l => !l.sequence_id);

      // Pick a sequence — auto-pick if only one, otherwise prompt.
      let seqId = seqs[0].id;
      if (seqs.length > 1) {
        const list = seqs.map((s, i) => `${i + 1}. ${s.name} (${s.total_steps} steps)`).join('\n');
        const pick = prompt(`Which sequence should leads use?\n\n${list}\n\nEnter the number:`);
        if (!pick) return;
        const idx = parseInt(pick, 10) - 1;
        if (isNaN(idx) || idx < 0 || idx >= seqs.length) return showToast('Invalid choice', 'error');
        seqId = seqs[idx].id;
      }
      const seqName = seqs.find(s => s.id === seqId)?.name || '?';

      const msg = `Push ALL ${eligible.length} eligible leads into the queue?\n\n`
        + `• Sequence: ${seqName}\n`
        + `• ${noSeq.length} leads will be assigned this sequence (step 1)\n`
        + `• ${eligible.length - noSeq.length} leads keep their current sequence + step\n`
        + `• Everyone unpaused and scheduled to send now\n`
        + `• ${skipped} leads SKIPPED (replied / booked / client / DNC / dead)`;
      if (!confirm(msg)) return;

      const now = new Date().toISOString();
      try {
        const BATCH = 200;

        // Step 1: assign sequence to leads that don't have one — also reset step to 0
        // and set stage to 'queued' so the worker picks them up cleanly.
        if (noSeq.length) {
          const ids = noSeq.map(l => l.id);
          for (let i = 0; i < ids.length; i += BATCH) {
            const slice = ids.slice(i, i + BATCH).join(',');
            await sb(`leads?id=in.(${slice})`, {
              method: 'PATCH',
              body: JSON.stringify({ sequence_id: seqId, sequence_step: 0, stage: 'queued', paused: false, next_send_at: now }),
            });
          }
        }

        // Step 2: unpause + reschedule everyone else who already has a sequence —
        // don't reset step or stage, just kick them.
        const withSeq = eligible.filter(l => l.sequence_id);
        if (withSeq.length) {
          const ids = withSeq.map(l => l.id);
          for (let i = 0; i < ids.length; i += BATCH) {
            const slice = ids.slice(i, i + BATCH).join(',');
            await sb(`leads?id=in.(${slice})`, {
              method: 'PATCH',
              body: JSON.stringify({ paused: false, next_send_at: now }),
            });
          }
        }

        showToast(`Queued ${eligible.length} leads (${noSeq.length} newly assigned)`);
        loadAll();
      } catch (e) { showToast('Queue all failed: ' + e.message, 'error'); }
    };

    window.setTemp = function (id, temp) {
      updateLead(id, { temperature: temp });
    };

    // Save stage immediately on dropdown change without closing the lead modal,
    // so users can keep editing other fields after picking a stage.
    window.quickSetStage = async function (id, stage) {
      try {
        await sb(`leads?id=eq.${id}`, { method: 'PATCH', body: JSON.stringify({ stage }) });
        const lead = state.leads.find(l => l.id === id);
        if (lead) lead.stage = stage;
        if (state.selectedLead?.id === id) state.selectedLead.stage = stage;
        showToast('Stage → ' + stage);
      } catch (e) { showToast('Stage update failed: ' + e.message, 'error'); }
    };

    window.markBooked = function (id) {
      if (!confirm('Mark as Call Booked?\n• stage → call_booked\n• paused → true\n• next_send_at → null\nCan still be promoted to ✓ Closed or downgraded later.')) return;
      updateLead(id, { stage: 'call_booked', paused: true, next_send_at: null });
    };

    window.markConverted = function (id) {
      if (!confirm('Mark as Converted (client)?\n• stage → client\n• paused → true\n• next_send_at → null\nThe sender will never touch this lead again unless you manually unlock.')) return;
      updateLead(id, { stage: 'client', paused: true, next_send_at: null });
    };

    window.markDnc = function (id) {
      if (!confirm('Mark as DNC?\n• stage → dnc\n• paused → true\n• next_send_at → null\nThe sender will never touch this lead again unless you manually unlock.')) return;
      updateLead(id, { stage: 'dnc', paused: true, next_send_at: null });
    };

    window.exportLeads = function () {
      if (!window.XLSX) return showToast('Excel library not loaded', 'error');
      if (!state.leads.length) return showToast('No leads to export', 'error');
      const ws = XLSX.utils.json_to_sheet(state.leads);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Leads');
      const fname = `leads_export_${new Date().toISOString().slice(0, 10)}.xlsx`;
      XLSX.writeFile(wb, fname);
      showToast(`Exported ${state.leads.length} leads`);
    };

    window.deleteLead = async function (id, name) {
      if (!confirm(`Delete "${name}" permanently?\nThis removes the lead and any send_log rows for it. Cannot be undone.`)) return;
      try {
        await sb(`send_log?lead_id=eq.${id}`, { method: 'DELETE' });
        await sb(`leads?id=eq.${id}`, { method: 'DELETE' });
        showToast('Deleted');
        state.selectedLead = null;
        loadAll();
      } catch (e) { showToast('Delete failed: ' + e.message, 'error'); }
    };

    window.deleteAllIncomplete = async function () {
      const isBlank = v => !v || !String(v).trim();
      const targets = state.leads.filter(l => isBlank(l.name) && isBlank(l.restaurant_name));
      if (!targets.length) return showToast('Nothing to delete', 'error');
      if (!confirm(`Permanently DELETE ${targets.length} leads with no name and no restaurant?\nThis cannot be undone.`)) return;
      try {
        const ids = targets.map(l => l.id);
        const BATCH = 100;
        for (let i = 0; i < ids.length; i += BATCH) {
          const slice = ids.slice(i, i + BATCH).join(',');
          await sb(`send_log?lead_id=in.(${slice})`, { method: 'DELETE' });
          await sb(`leads?id=in.(${slice})`, { method: 'DELETE' });
        }
        showToast(`Deleted ${targets.length} leads`);
        loadAll();
      } catch (e) { showToast('Bulk delete failed: ' + e.message, 'error'); }
    };

    window.lockContacted = function (id) {
      if (!confirm('Lock this lead?\n• stage → DNC\n• paused → true\n• next_send_at → null\nThe sender will never touch this lead again unless you manually unlock.')) return;
      updateLead(id, { stage: 'dnc', paused: true, next_send_at: null });
    };

    window.lockAllContacted = async function () {
      const active = state.leads.filter(l =>
        ((l.total_msgs_sent || 0) > 0 || l.last_msg_sent_at) &&
        !l.paused && !['dnc', 'dead', 'client', 'replied'].includes(l.stage)
      );
      if (!active.length) return showToast('Nothing to lock', 'error');
      if (!confirm(`Lock ${active.length} contacted leads?\n• stage → DNC\n• paused → true\n• next_send_at → null\nReversible per-lead in the lead detail modal.`)) return;
      try {
        const ids = active.map(l => l.id).join(',');
        await sb(`leads?id=in.(${ids})`, { method: 'PATCH', body: JSON.stringify({ stage: 'dnc', paused: true, next_send_at: null }) });
        showToast(`Locked ${active.length} leads`);
        loadAll();
      } catch (e) { showToast('Error: ' + e.message, 'error'); }
    };

    window.openWAFor = async function (id) {
      const lead = state.leads.find(l => l.id === id);
      if (!lead) return;
      const body = sanitize(fillWaTemplate(state.waTemplate, lead));
      const url = waUrlFor(lead, body);
      if (!url) return showToast('No phone number on this lead', 'error');

      // Mark as contacted immediately so the lead shifts to the Contacted tab
      // and is invisible to the auto-sender's filter.
      const updates = {
        total_msgs_sent: (lead.total_msgs_sent || 0) + 1,
        last_msg_sent_at: new Date().toISOString(),
        paused: true,
        next_send_at: null,
      };
      if (['new', 'queued'].includes(lead.stage)) updates.stage = 'contacted';

      try {
        await sb(`leads?id=eq.${lead.id}`, { method: 'PATCH', body: JSON.stringify(updates) });
        Object.assign(lead, updates); // local state mirror so UI reflects immediately
        sb('send_log', {
          method: 'POST', body: JSON.stringify({
            lead_id: lead.id,
            channel: 'whatsapp',
            status: 'sent',
            message_body: body,
            sent_at: new Date().toISOString(),
          })
        }).catch(() => { });
        showToast(`Marked as contacted — opening WhatsApp`);
        render();
      } catch (e) {
        console.warn('Failed to mark contacted:', e);
        showToast('Opened WhatsApp but DB update failed — check console', 'error');
      }
      window.open(url, '_blank');
    };

    window.saveWaTemplate = function () {
      const v = document.getElementById('wa-tpl')?.value;
      if (v == null) return;
      state.waTemplate = v;
      localStorage.setItem('pfc_wa_template', v);
      state.showWaTemplate = false;
      showToast('Template saved');
    };

    window.resetWaTemplate = function () {
      state.waTemplate = DEFAULT_WA_TEMPLATE;
      localStorage.removeItem('pfc_wa_template');
      render();
    };

    window.doUpdateLead = function (id) {
      const stage = document.getElementById('ld-stage')?.value;
      const painPick = document.getElementById('ld-pain')?.value || '';
      const painOther = (document.getElementById('ld-pain-other')?.value || '').trim();
      const notes = document.getElementById('ld-notes')?.value;
      const tplRaw = document.getElementById('ld-tpl')?.value;
      let painPoint = null;
      if (painPick === 'Other') painPoint = painOther ? `Other: ${painOther}` : 'Other';
      else if (painPick) painPoint = painPick;
      const updates = {
        stage,
        notes,
        pain_point: painPoint,
        custom_template: (tplRaw && tplRaw.trim()) ? tplRaw : null,
      };

      // If user was in edit mode, also persist the basic info fields.
      const nameEl = document.getElementById('ld-name');
      if (nameEl) {
        const name = nameEl.value.trim();
        if (!name) return showToast('Name required', 'error');
        const phoneRaw = document.getElementById('ld-phone')?.value || '';
        const phoneNorm = normalizePhone(phoneRaw);
        if (!phoneNorm) return showToast('Phone could not be recognised — use +91XXXXXXXXXX or 10-digit Indian mobile', 'error');
        Object.assign(updates, {
          name,
          phone: phoneNorm,
          email: document.getElementById('ld-email')?.value.trim() || null,
          restaurant_name: document.getElementById('ld-rest')?.value.trim() || null,
          city: document.getElementById('ld-city')?.value.trim() || null,
          area: document.getElementById('ld-area')?.value.trim() || null,
          cuisine: document.getElementById('ld-cuisine')?.value.trim() || null,
          swiggy_rating: document.getElementById('ld-sr')?.value ? parseFloat(document.getElementById('ld-sr').value) : null,
          zomato_rating: document.getElementById('ld-zr')?.value ? parseFloat(document.getElementById('ld-zr').value) : null,
          monthly_orders: document.getElementById('ld-mo')?.value.trim() || null,
        });
      }
      updateLead(id, updates);
    };

    let csvParsed = [];
    let csvDropped = 0;
    let csvDuplicates = 0;
    let csvDroppedSamples = [];
    let csvDuplicateSamples = [];
    let csvExisting = new Set();
    let csvPreflightLoading = false;

    async function fetchExistingPhones(phones) {
      if (!phones.length) return new Set();
      const set = new Set();
      const BATCH = 200;
      for (let i = 0; i < phones.length; i += BATCH) {
        const slice = phones.slice(i, i + BATCH);
        const list = slice.map(p => encodeURIComponent('"' + p + '"')).join(',');
        try {
          const rows = await sb(`leads?select=phone&phone=in.(${list})`);
          if (Array.isArray(rows)) rows.forEach(r => r.phone && set.add(r.phone));
        } catch (e) { console.warn('preflight check failed for batch', i, e); }
      }
      return set;
    }

    function renderUploadPreview() {
      const prev = document.getElementById('csv-preview');
      if (!prev) return;
      const warnRow = (label, count, samples, color) => count > 0
        ? `<details style="background:rgba(${color},0.10);border:1px solid rgba(${color},0.3);border-radius:8px;padding:8px 14px;margin:8px 0;font-size:12px;color:rgba(${color},1)">
         <summary style="cursor:pointer;font-weight:600">⚠ ${count} ${label}${count === 1 ? '' : 's'} (click to see first ${Math.min(count, 10)})</summary>
         <div style="margin-top:8px;font-family:var(--mono);font-size:11px;line-height:1.6;max-height:160px;overflow:auto">
           ${samples.slice(0, 10).map(r => `• ${(r.name || '(no name)')} — phone: <code>${(r.rawPhone || '(empty)')}</code>${r.note ? '  ' + r.note : ''}`).join('<br>')}
         </div>
       </details>`
        : '';
      const existingCount = csvParsed.filter(r => csvExisting.has(r.phone)).length;
      const newCount = csvParsed.length - existingCount;
      const mode = state.uploadMode;
      const willUploadCount = mode === 'overwrite' ? csvParsed.length : newCount;
      const preflightBlock = csvPreflightLoading
        ? `<div style="background:rgba(96,165,250,0.10);border:1px solid rgba(96,165,250,0.3);border-radius:8px;padding:8px 14px;margin:8px 0;font-size:12px;color:#93c5fd">Checking which phones already exist in the database…</div>`
        : `<div style="background:rgba(74,222,128,0.10);border:1px solid rgba(74,222,128,0.3);border-radius:8px;padding:10px 16px;margin:8px 0;font-size:13px;color:#86efac">
         <b>${newCount}</b> new · <b>${existingCount}</b> already in DB
       </div>`;
      prev.innerHTML = `<div style="background:rgba(74,222,128,0.12);border:1px solid rgba(74,222,128,0.3);border-radius:8px;padding:10px 16px;margin:12px 0;font-size:13px;color:#86efac;font-weight:600">${csvParsed.length} unique leads parsed</div>
    ${warnRow('row dropped (unrecognizable phone)', csvDropped, csvDroppedSamples, '248,113,113')}
    ${warnRow('duplicate phone collapsed', csvDuplicates, csvDuplicateSamples, '251,191,36')}
    ${preflightBlock}
    <label style="margin-top:4px">Mode</label>
    <select id="csv-mode" onchange="state.uploadMode=this.value;renderUploadPreview()">
      <option value="insert-only" ${mode === 'insert-only' ? 'selected' : ''}>Insert only new (skip phones already in DB) — safe</option>
      <option value="overwrite" ${mode === 'overwrite' ? 'selected' : ''}>Insert + overwrite existing (resets stage, notes, sequence on existing leads)</option>
    </select>
    <label>Assign to sequence:</label>
    <select id="csv-seq"><option value="">None (new leads only)</option>${state.sequences.map(s => `<option value="${s.id}">${s.name} (${s.total_steps} steps)</option>`).join('')}</select>
    <div style="max-height:180px;overflow:auto;margin:12px 0;border:1px solid var(--border);border-radius:8px">
      <table><thead><tr><th>Name</th><th>Phone</th><th>Restaurant</th><th>City</th><th>Status</th></tr></thead><tbody>
      ${csvParsed.slice(0, 15).map(r => {
        const exists = csvExisting.has(r.phone);
        const tag = csvPreflightLoading ? '<span class="muted">…</span>' : (exists ? '<span style="color:#fbbf24;font-size:10px;font-weight:700">EXISTS</span>' : '<span style="color:#86efac;font-size:10px;font-weight:700">NEW</span>');
        return `<tr><td>${r.name}</td><td class="phone">${r.phone}</td><td>${r.restaurant_name}</td><td>${r.city}</td><td>${tag}</td></tr>`;
      }).join('')}
      </tbody></table>
      ${csvParsed.length > 15 ? `<div style="padding:8px;text-align:center;font-size:11px;color:var(--text3)">...and ${csvParsed.length - 15} more</div>` : ''}
    </div>
    <button class="btn btn-primary" style="width:100%;padding:14px${csvPreflightLoading || willUploadCount === 0 ? ';opacity:0.5;pointer-events:none' : ''}" onclick="doCSVUpload()">${csvPreflightLoading ? 'Checking…' :
          mode === 'overwrite' ? `Upload ${csvParsed.length} rows (${existingCount} will overwrite)` :
            willUploadCount === 0 ? 'Nothing new to upload' :
              `Upload ${newCount} new leads${existingCount ? ' (' + existingCount + ' skipped)' : ''}`
        }</button>`;
    }

    function applyMapped(rows) {
      csvDropped = 0; csvDuplicates = 0; csvDroppedSamples = []; csvDuplicateSamples = []; csvExisting = new Set();
      const seen = new Map();
      const kept = [];
      rows.forEach(raw => {
        const mapped = mapCSV(raw);
        const rawPhone = String(raw.phone || raw.phone_number || raw.mobile || raw.whatsapp || raw.contact || '').trim();
        if (!mapped.phone) {
          csvDropped++;
          if (csvDroppedSamples.length < 10) csvDroppedSamples.push({ name: mapped.name, rawPhone });
          return;
        }
        if (seen.has(mapped.phone)) {
          csvDuplicates++;
          if (csvDuplicateSamples.length < 10) csvDuplicateSamples.push({ name: mapped.name, rawPhone, note: '(matches ' + seen.get(mapped.phone).name + ')' });
          return;
        }
        seen.set(mapped.phone, mapped);
        kept.push(mapped);
      });
      csvParsed = kept;
    }

    async function runPreflight() {
      csvExisting = new Set();
      csvPreflightLoading = true;
      renderUploadPreview();
      try {
        csvExisting = await fetchExistingPhones(csvParsed.map(r => r.phone));
      } catch (e) {
        console.warn('preflight failed', e);
        showToast('Pre-flight check failed — uploading all rows', 'error');
      }
      csvPreflightLoading = false;
      renderUploadPreview();
    }

    window.handleFile = function (input) {
      const file = input.files[0]; if (!file) return;
      const ext = (file.name.split('.').pop() || '').toLowerCase();
      const reader = new FileReader();
      if (ext === 'csv') {
        reader.onload = e => {
          applyMapped(parseCSV(e.target.result));
          renderUploadPreview();
          runPreflight();
        };
        reader.readAsText(file);
      } else if (ext === 'xlsx' || ext === 'xls') {
        if (!window.XLSX) { alert('Excel library failed to load. Check your internet connection and refresh.'); return; }
        reader.onload = e => {
          try {
            const wb = XLSX.read(e.target.result, { type: 'array' });
            const sheet = wb.Sheets[wb.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet, { defval: '' }).map(normalizeRow);
            applyMapped(rows);
            renderUploadPreview();
            runPreflight();
          } catch (err) {
            alert('Failed to parse Excel file: ' + err.message);
          }
        };
        reader.readAsArrayBuffer(file);
      } else {
        alert('Unsupported file type. Use .csv, .xlsx, or .xls.');
      }
    };

    window.doCSVUpload = function () {
      const seqId = document.getElementById('csv-seq')?.value;
      const directMode = state.uploadContext === 'direct';
      const leads = csvParsed.map(l => ({
        ...l,
        source: directMode ? (l.source && l.source !== 'csv' && !String(l.source).startsWith('ig:') ? 'direct:' + l.source : 'direct') : l.source,
        sequence_id: seqId || null,
        stage: seqId ? 'queued' : 'new',
        next_send_at: seqId ? new Date().toISOString() : null,
      }));
      bulkUpload(leads, state.uploadMode);
      state.uploadContext = 'leads';
    };

    // INIT
    render();
    if (state.authed) loadAll();

    // Auto-refresh every 60s so the worker's writes show up without a manual ↻.
    // Only refreshes when the user isn't typing in a text field, to avoid
    // clobbering input — the existing focus-preservation in render() also helps.
    setInterval(() => {
      if (!state.authed) return;
      // Skip auto-refresh when any modal is open — a full re-render mid-edit
      // disrupts focus, scroll, and pending button clicks. User can hit Refresh
      // manually inside the modal if they want fresh data.
      if (state.selectedLead || state.showCSV || state.showAddLead || state.showWaTemplate || state.showMsgLog) return;
      // Skip if user is actively typing in a field somewhere on the page.
      const ae = document.activeElement;
      const typing = ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA');
      if (typing) return;
      loadAll(true); // silent — no loading spinner flicker
      if (state.view === 'inbox') loadInbox();
      if (state.view === 'dashboard') loadMessageStats();
    }, 60000);
  </script>
</body>

</html>
